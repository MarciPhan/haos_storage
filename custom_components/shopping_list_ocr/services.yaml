scan_receipt:
  name: Skenovat účtenku
  description: Naskenuje obrázek účtenky pomocí OCR a vytáhne z něj položky.
  fields:
    image_path:
      name: Cesta k obrázku
      description: Absolutní cesta k souboru s obrázkem účtenky.
      example: "/config/www/uctenky/uctenka.jpg"
      required: true

scan_folder:
  name: Skenovat složku
  description: Projde složku a naskenuje všechny nové obrázky účtenek.
  fields:
    folder_path:
      name: Cesta ke složce
      description: Cesta ke složce s obrázky (výchozí /config/www/uctenky/).
      example: "/config/www/uctenky/"
      required: false

confirm_receipt:
  name: Potvrdit účtenku
  description: Potvrdí položky z čekající účtenky a přidá je do inventáře.
  fields:
    receipt_id:
      name: ID účtenky
      description: UUID čekající účtenky.
      required: true

update_inventory:
  name: Aktualizovat sklad
  description: Ruční aktualizace nebo smazání položky v inventáři.
  fields:
    name:
      name: Název
      description: Název položky.
      required: true
    quantity:
      name: Množství
      required: false
    last_price:
      name: Poslední cena
      required: false
    unit:
      name: Jednotka
      description: Jednotka (ks, kg, l).
      required: false
    category:
      name: Kategorie
    location:
      name: Umístění
    expiry_date:
      name: Expirace
      example: "2024-12-31"
    min_quantity:
      name: Minimální množství
    action:
      name: Akce
      description: "update", "delete" nebo "consume".
      required: false

add_item_by_ean:
  name: Přidat podle EAN
  description: Vyhledá produkt podle EAN kódu v Open Food Facts a přidá do skladu.
  fields:
    ean:
      name: EAN kód
      description: Čárový kód produktu (8 nebo 13 číslic).
      example: "8594003025310"
      required: true
    quantity:
      name: Množství
      description: Počet kusů k přidání.
      required: false

add_recipe:
  name: Přidat recept
  description: Stáhne recept z URL, uloží data a vygeneruje PDF.
  fields:
    url:
      name: URL receptu
      description: Odkaz na recept (toprecepty.cz, recepty.cz, vareni.cz…).
      example: "https://www.toprecepty.cz/recept/12345"
      required: true
